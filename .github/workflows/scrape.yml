name: Scrape Gaokao Specialties

on:
  schedule:
    - cron: '0 11 * * 0'  # жҜҸе‘Ёж—Ҙ 11:00 UTC
  workflow_dispatch:  # е…Ғи®ёжүӢеҠЁи§ҰеҸ‘

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout repository with App token
        uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: |
          python -m playwright install --with-deps chromium

      - name: Run scraper
        id: scrape
        continue-on-error: true  # еҚідҪҝеӨұиҙҘд№ҹз»§з»ӯжү§иЎҢ
        run: |
          python main.py --all --format json

      - name: Check scrape results
        id: check-results
        run: |
          # жЈҖжҹҘжҳҜеҗҰжңүж–°ж•°жҚ®ж–Үд»¶з”ҹжҲҗ
          if ls data/specialties_*.json 1> /dev/null 2>&1; then
            latest_file=$(ls -t data/specialties_*.json | head -1)
            specialty_count=$(python -c "import json; data=json.load(open('$latest_file')); print(len(data.get('specialties', [])))")
            echo "specialty_count=$specialty_count" >> $GITHUB_OUTPUT

            if [ "$specialty_count" -eq "0" ]; then
              echo "вҡ пёҸ зҲ¬еҸ–еӨұиҙҘпјҡжңӘиҺ·еҸ–еҲ°дё“дёҡж•°жҚ®пјҲеҸҜиғҪиў« WAF жӢҰжҲӘпјү"
              echo "status=failed" >> $GITHUB_OUTPUT
            else
              echo "вң… зҲ¬еҸ–жҲҗеҠҹпјҡиҺ·еҸ–еҲ° $specialty_count дёӘдё“дёҡ"
              echo "status=success" >> $GITHUB_OUTPUT
            fi
          else
            echo "вҡ пёҸ жңӘжүҫеҲ°ж•°жҚ®ж–Үд»¶"
            echo "status=no_file" >> $GITHUB_OUTPUT
          fi

      - name: Get GitHub App bot user ID
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          echo "user-id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)" >> "$GITHUB_OUTPUT"

      - name: Commit and push data
        if: steps.check-results.outputs.status == 'success'
        run: |
          git remote set-url origin https://x-access-token:${{ steps.app-token.outputs.token }}@github.com/${{ github.repository }}.git
          git config --local user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --local user.email "${{ steps.app-user.outputs.user-id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "рҹ“Ҡ Update specialty data - $(date +%Y-%m-%d)"
          git push origin HEAD:${{ github.ref_name }}

      - name: Create issue on failure
        if: steps.check-results.outputs.status != 'success'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue create \
            --title "вҡ пёҸ зҲ¬иҷ«иҝҗиЎҢеӨұиҙҘ - $(date +%Y-%m-%d)" \
            --body "## зҲ¬иҷ«иҝҗиЎҢеӨұиҙҘ

          **ж—¶й—ҙ**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
          **зҠ¶жҖҒ**: ${{ steps.check-results.outputs.status }}
          **дё“дёҡж•°йҮҸ**: ${{ steps.check-results.outputs.specialty_count || '0' }}

          ### еҸҜиғҪеҺҹеӣ 
          - йҳҝйҮҢдә‘зӣҫ WAF жӢҰжҲӘпјҲHTTP 412пјү
          - зҪ‘з»ңиҝһжҺҘй—®йўҳ
          - йЎөйқўз»“жһ„еҸҳеҢ–

          ### е»әи®®и§ЈеҶіж–№жЎҲ
          1. й…ҚзҪ®д»ЈзҗҶжңҚеҠЎеҷЁпјҲеңЁ Secrets дёӯж·»еҠ  PROXY_HTTPпјү
          2. дҪҝз”ЁжүӢеҠЁеҜје…ҘжЁЎејҸпјҡ
             - иҝҗиЎҢ \`python main.py --template\` з”ҹжҲҗжЁЎжқҝ
             - жүӢеҠЁи®ҝй—®зҪ‘з«ҷж”¶йӣҶж•°жҚ®
             - иҝҗиЎҢ \`python main.py --import data/template.json\`
          3. иҒ”зі»еӯҰдҝЎзҪ‘иҺ·еҸ–е®ҳж–№ API

          жҹҘзңӢиҜҰз»Ҷж—Ҙеҝ—пјҡ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --label "automation,scraper-failure" || echo "Failed to create issue"

