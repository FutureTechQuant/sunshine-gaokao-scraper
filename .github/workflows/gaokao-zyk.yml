name: Run CHSI Web Automation

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: "1"

jobs:
  run-script:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: |
            ${{ github.event.repository.name }}
          permission-contents: write

      - name: Checkout repository with App token
        uses: actions/checkout@v5
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: |
          python -m playwright install --with-deps chromium

      - name: Run automation script
        id: run-automation
        continue-on-error: true
        run: |
          python scripts/gaokao_zyk.py

      - name: Check outputs
        id: check-results
        shell: bash
        run: |
          set -euo pipefail

          if [ -d output ] && [ "$(find output -type f | wc -l)" -gt 0 ]; then
            file_count=$(find output -type f | wc -l | tr -d ' ')
            echo "status=success" >> "$GITHUB_OUTPUT"
            echo "file_count=$file_count" >> "$GITHUB_OUTPUT"
            echo "✅ 找到输出文件 $file_count 个"
          else
            echo "status=no_file" >> "$GITHUB_OUTPUT"
            echo "file_count=0" >> "$GITHUB_OUTPUT"
            echo "⚠️ output/ 目录不存在或没有文件"
          fi

      - name: Prepare repository output folder
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p data/chsi-zyk
          rsync -av --delete output/ data/chsi-zyk/

      - name: Show changed files
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          git status --short
          find data/chsi-zyk -maxdepth 2 -type f | sort || true

      - name: Configure git identity
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          git config --local user.name "${{ steps.app-token.outputs.app-slug }}[bot]"
          git config --local user.email "${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com"

      - name: Commit and push outputs to repository
        if: steps.check-results.outputs.status == 'success'
        shell: bash
        run: |
          set -euo pipefail

          git add data/chsi-zyk/

          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🤖 Update CHSI automation outputs - $(date +%Y-%m-%d)"
            git push
          fi

      - name: Upload outputs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gaokao-zyk-output
          path: output/
          if-no-files-found: warn
          retention-days: 7
          overwrite: true
